name: fittask
description: "FitTask - Fitness RPG App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.10.0
  google_generative_ai: ^0.4.7
  cloud_firestore: ^6.5.0
  firebase_auth: ^6.5.2
  firebase_storage: ^13.4.2
  google_sign_in: ^6.1.5
  pedometer: ^4.0.0
  permission_handler: ^11.3.1
  shared_preferences: ^2.2.3
  audioplayers: ^6.1.0
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: "^0.13.1"
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo_app.png"
  min_sdk_android: 21
